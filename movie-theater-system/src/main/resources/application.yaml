spring:
  application:
    name: movie-theater-system

server:
  port: 8080

theater:
  cancellation:
    min-minutes-before-show: 30
  pricing:
    seat-multipliers:
      standard: 1.0
      premium: 1.3
      recliner: 1.6
      imax: 2.0
    time-multipliers:
      matinee: 0.8
      evening: 1.0
      late-night: 0.9
    weekend-multiplier: 1.2
