server:
  port: 8095

spring:
  application:
    name: recipe-finder

themealdb:
  api:
    base-url: https://www.themealdb.com/api/json/v1/1
    # Free public API — no key required
    # The "1" in the URL is the public test key
    # Docs: https://www.themealdb.com/api.php

webclient:
  ssl:
    trust-all: true  # Set to true to bypass SSL certificate validation (for Apigee/corporate proxy)

